spring:
  application:
    name: cogumelos-api

  datasource:
    url: jdbc:postgresql://localhost:5432/cogumelos
    username: cogumelos_user
    password: ${DB_PASSWORD:cogumelos123}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8081

jwt:
  secret: cogumelos-secret-key-minimo-32-caracteres-seguro
  expiration: 900000
  refresh-expiration-days: 30

security:
  oauth2:
    client:
      registration:
        google:
          client-id: ${GOOGLE_CLIENT_ID}
          client-secret: ${GOOGLE_CLIENT_SECRET}
          scope:
            - email
            - profile
          redirect-uri: "http://localhost:8081/api/auth/oauth2/callback/google"

app:
  frontend-url: http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.cogumelos: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
  show-actuator: false