spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  mail:
    host: localhost
    port: 3025
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false   # DDL gerado pelo Hibernate nos testes

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: email,profile
            redirect-uri: http://localhost:8080/api/auth/oauth2/callback/google

jwt:
  secret: test-secret-key-minimo-32-caracteres-seguro-para-testes
  expiration: 900000
  refresh-expiration-days: 30

app:
  frontend-url: http://localhost:3000
management:
  health:
    mail:
      enabled: false