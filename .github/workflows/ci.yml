name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — testes Java
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Rodar testes
        working-directory: backend
        run: mvn test -B
        env:
          JWT_SECRET: test-secret-key-minimo-32-caracteres-seguro-para-ci
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          FRONTEND_URL: http://localhost:3000

      - name: Publicar resultado dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend — testes TypeScript/React
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Rodar testes
        working-directory: frontend
        run: npm test

      - name: Build de produção
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080


  # ── Verificação de copyright ───────────────────────────────────────────────
  copyright-check:
    name: Verificar cabeçalhos de copyright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verificar headers
        run: python add-copyright.py . --verify

  # ── Verificação de segredos ────────────────────────────────────────────────
  secrets-scan:
    name: Verificar segredos expostos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan com Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
