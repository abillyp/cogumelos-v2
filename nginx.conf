# nginx.conf — organico4you.com.br
# Gerado para o projeto cogumelos-v2
#
# Após obter o certificado SSL com certbot, este arquivo será
# atualizado automaticamente pelo certbot com os blocos SSL.

server {
    listen 80;
    server_name organico4you.com.br www.organico4you.com.br;

    # Certbot vai substituir este bloco por HTTPS + redirect
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Segurança — headers adicionais
    add_header X-Frame-Options "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Limita tamanho de upload
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/cogumelos-access.log;
    error_log  /var/log/nginx/cogumelos-error.log;
}

